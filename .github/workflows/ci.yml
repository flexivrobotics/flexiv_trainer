name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# The CI job only checks out the repo and runs tests; read-only contents access
# is all the GITHUB_TOKEN needs.
permissions:
  contents: read

jobs:
  ci:
    name: CI @ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, macos-26, windows-2025]
    defaults:
      run:
        # Use bash everywhere (it ships on the Windows runners too) so the
        # multi-line install steps with `\` continuations parse on every OS;
        # the default Windows shell is PowerShell, which rejects `\`.
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package without vendor dependencies
        run: python -m pip install -e . --no-deps

      - name: Install open-source test dependencies
        run: |
          python -m pip install \
            "fastapi>=0.136,<1.0" \
            "uvicorn>=0.48,<1.0" \
            "pydantic-settings>=2.14,<3.0" \
            "typer>=0.25,<1.0" \
            "rich>=13.9,<14.0" \
            "numpy>=1.26" \
            "scipy>=1.11" \
            "pytest>=8.4,<9.0" \
            "httpx>=0.28,<1.0" \
            "lerobot[dataset]==0.6.0"

      - name: Run test suite
        run: pytest