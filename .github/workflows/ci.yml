name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ubuntu-24:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Run tests
        uses: ./.github/actions/run-tests

  ubuntu-22:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Run tests
        uses: ./.github/actions/run-tests

  macos-26:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Run tests
        uses: ./.github/actions/run-tests