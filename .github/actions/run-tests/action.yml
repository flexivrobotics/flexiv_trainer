name: Run tests
description: Set up Python, install the package without vendor deps, and run the test suite.

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install package without vendor dependencies
      shell: bash
      run: python -m pip install -e . --no-deps

    - name: Install open-source test dependencies
      shell: bash
      run: |
        python -m pip install \
          "fastapi>=0.136,<1.0" \
          "uvicorn>=0.48,<1.0" \
          "pydantic-settings>=2.14,<3.0" \
          "typer>=0.25,<1.0" \
          "rich>=13.9,<14.0" \
          "numpy>=1.26" \
          "pytest>=8.4,<9.0" \
          "httpx>=0.28,<1.0"

    - name: Run test suite
      shell: bash
      run: pytest
